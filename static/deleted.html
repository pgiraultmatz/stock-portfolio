<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio Editor — Account deleted</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 40px 36px;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }
    h1 { font-size: 20px; font-weight: 700; color: #e6edf3; margin-bottom: 10px; }
    p { font-size: 14px; color: #8b949e; line-height: 1.6; margin-bottom: 28px; }
    a {
      display: inline-block;
      padding: 9px 24px;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #c9d1d9;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.15s, border-color 0.15s;
    }
    a:hover { background: #2d333b; border-color: #484f58; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Your account has been deleted</h1>
    <p>All your data has been permanently removed.<br>We hope to see you again someday.</p>
    <a href="/auth/login">Back to login</a>
  </div>
</body>
</html>
